plugins {
    id 'java'
    id 'application'
}

group = 'edu.upc'
version = '1.0-SNAPSHOT'

application {
    mainClass = 'src.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation files('src/main/java/packages/AIMA.jar', 'src/main/java/packages/Desastres.jar')
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}